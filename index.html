<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>API余额</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #14141f;
    --surface2: #1c1c2a;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text2: #9999aa;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --green: #00d2a9;
    --red: #ff6b6b;
    --yellow: #ffc048;
    --radius: 16px;
    --radius-sm: 10px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    padding: 16px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 {
    font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-actions { display: flex; gap: 8px; }
  .btn-icon {
    width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; transition: all 0.15s;
  }
  .btn-icon:active { transform: scale(0.92); background: var(--surface2); }

  /* ── Summary bar ── */
  .summary {
    display: flex; gap: 10px; padding: 0 20px; margin-bottom: 16px;
  }
  .summary-card {
    flex: 1; background: var(--surface); border-radius: var(--radius-sm);
    padding: 14px 12px; text-align: center; border: 1px solid var(--border);
  }
  .summary-card .val { font-size: 22px; font-weight: 700; }
  .summary-card .lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .val.green { color: var(--green); }
  .val.yellow { color: var(--yellow); }
  .val.red { color: var(--red); }

  /* ── Provider cards ── */
  .list { padding: 0 20px 100px; display: flex; flex-direction: column; gap: 12px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px;
    transition: all 0.2s; cursor: pointer; position: relative; overflow: hidden;
  }
  .card:active { transform: scale(0.98); }
  .card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .card-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .card-icon.anthropic { background: #f0ebe4; color: #141413; }
  .card-icon.openai { background: #10a37f; color: #fff; }
  .card-icon.google { background: #4285f4; color: #fff; }
  .card-icon.deepseek { background: #4d5bf9; color: #fff; }
  .card-icon.groq { background: #f55036; color: #fff; }
  .card-icon.openrouter { background: #6366f1; color: #fff; }
  .card-icon.custom { background: var(--surface2); color: var(--accent2); }

  .card-name { font-weight: 600; font-size: 16px; }
  .card-status { font-size: 12px; display: flex; align-items: center; gap: 4px; margin-top: 2px; }
  .card-status .dot { width: 7px; height: 7px; border-radius: 50%; }
  .card-status .dot.ok { background: var(--green); }
  .card-status .dot.warn { background: var(--yellow); }
  .card-status .dot.err { background: var(--red); }
  .card-status .dot.idle { background: #555; }
  .card-arrow { margin-left: auto; color: var(--text2); font-size: 14px; }

  .card-balance { display: flex; gap: 16px; flex-wrap: wrap; }
  .card-stat { flex: 1; min-width: 70px; }
  .card-stat .num { font-size: 18px; font-weight: 700; }
  .card-stat .label { font-size: 11px; color: var(--text2); }

  .progress-bar {
    height: 4px; background: var(--surface2); border-radius: 2px;
    margin-top: 12px; overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%; border-radius: 2px; transition: width 0.6s ease;
    background: var(--green);
  }
  .progress-bar .fill.warn { background: var(--yellow); }
  .progress-bar .fill.danger { background: var(--red); }

  /* ── Bottom nav ── */
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; padding: 8px 8px calc(8px + var(--safe-bottom));
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding: 8px; border: none; background: none; color: var(--text2);
    font-size: 11px; cursor: pointer; border-radius: 10px; transition: all 0.15s;
  }
  .nav-btn.active { color: var(--accent2); }
  .nav-btn .ico { font-size: 20px; }

  /* ── Modal / Sheet ── */
  .overlay {
    position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.6);
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .sheet {
    background: var(--surface); width: 100%; max-width: 500px;
    border-radius: 20px 20px 0 0; padding: 8px 20px 28px;
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    max-height: 85dvh; overflow-y: auto;
  }
  .overlay.show .sheet { transform: translateY(0); }
  .sheet-handle {
    width: 36px; height: 4px; background: #444; border-radius: 2px;
    margin: 8px auto 16px;
  }
  .sheet h2 { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
  .form-group input, .form-group select {
    width: 100%; padding: 12px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-size: 15px; outline: none;
    font-family: monospace; transition: border 0.15s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .form-group select { font-family: inherit; }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }
  .btn {
    width: 100%; padding: 14px; border-radius: var(--radius-sm);
    border: none; font-size: 16px; font-weight: 600; cursor: pointer;
    transition: all 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text); }
  .btn-danger { background: #3a1a1a; color: var(--red); }
  .btn-sm { padding: 8px 16px; font-size: 13px; border-radius: 8px; width: auto; }

  /* ── Toast ── */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-120px);
    background: var(--surface2); color: var(--text); padding: 12px 20px;
    border-radius: 12px; font-size: 14px; z-index: 400; border: 1px solid var(--border);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── PIN screen ── */
  .pin-screen {
    position: fixed; inset: 0; z-index: 500; background: var(--bg);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 40px;
  }
  .pin-screen.hidden { display: none; }
  .pin-icon { font-size: 60px; margin-bottom: 20px; }
  .pin-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .pin-subtitle { font-size: 14px; color: var(--text2); margin-bottom: 28px; }
  .pin-input {
    width: 220px; padding: 14px; text-align: center; font-size: 24px;
    letter-spacing: 16px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--surface); color: var(--text); outline: none; font-family: monospace;
  }
  .pin-input:focus { border-color: var(--accent); }
  .pin-error { color: var(--red); font-size: 13px; margin-top: 8px; min-height: 20px; }

  /* ── Empty state ── */
  .empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 20px; text-align: center;
  }
  .empty-icon { font-size: 64px; margin-bottom: 16px; }
  .empty h3 { font-size: 18px; margin-bottom: 6px; }
  .empty p { color: var(--text2); font-size: 14px; max-width: 260px; margin-bottom: 20px; line-height: 1.5; }

  /* ── Settings ── */
  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0; border-bottom: 1px solid var(--border);
  }
  .setting-row .label { font-weight: 500; }
  .setting-row .hint { font-size: 12px; color: var(--text2); }
  .toggle {
    width: 50px; height: 30px; border-radius: 15px;
    background: var(--border); cursor: pointer; position: relative;
    transition: background 0.2s;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 24px; height: 24px; border-radius: 50%; background: #fff;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(20px); }

  /* ── Page container ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card { animation: fadeUp 0.35s ease backwards; }
  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.10s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.20s; }
  .card:nth-child(5) { animation-delay: 0.25s; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .loading .card-stat .num { animation: pulse 1s infinite; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<!-- PIN Screen -->
<div class="pin-screen hidden" id="pinScreen">
  <div class="pin-icon">🔐</div>
  <div class="pin-title">输入PIN码</div>
  <div class="pin-subtitle">保护你的 API 密钥安全</div>
  <input type="password" class="pin-input" id="pinInput" maxlength="6" inputmode="numeric" autocomplete="off" placeholder="······">
  <div class="pin-error" id="pinError"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Header -->
<div class="header">
  <h1>💎 API 余额</h1>
  <div class="header-actions">
    <button class="btn-icon" onclick="refreshAll()" title="刷新">🔄</button>
  </div>
</div>

<!-- Summary -->
<div class="summary" id="summary"></div>

<!-- Main list -->
<div class="page active" id="pageHome">
  <div class="list" id="providerList"></div>
</div>

<!-- Settings page -->
<div class="page" id="pageSettings">
  <div class="list">
    <div style="margin-bottom:20px">
      <h3 style="margin-bottom:6px">🔒 安全</h3>
      <div class="setting-row" style="border-bottom:none">
        <div>
          <div class="label">PIN 码保护</div>
          <div class="hint">锁定应用需要PIN码</div>
        </div>
        <div class="toggle on" id="togglePin" onclick="togglePin()"></div>
      </div>
      <div class="setting-row">
        <div>
          <div class="label">修改 PIN 码</div>
          <div class="hint" id="pinStatus">未设置</div>
        </div>
        <button class="btn-sm btn-secondary" onclick="changePin()">修改</button>
      </div>
    </div>

    <div style="margin-bottom:20px">
      <h3 style="margin-bottom:6px">🌐 网络</h3>
      <div class="setting-row" style="border-bottom:none">
        <div>
          <div class="label">CORS 代理</div>
          <div class="hint">浏览器直连 API 可能被拦截，设代理转发</div>
        </div>
      </div>
      <div class="form-group" style="margin-top:4px">
        <input type="text" id="proxyUrl" placeholder="例如: http://192.168.1.x:3456/proxy?url=" onchange="saveProxy()">
        <div style="font-size:11px;color:var(--text2);margin-top:4px">
          留空＝直连。本地运行 <code>node server.js</code> 启动代理
        </div>
      </div>
    </div>

    <div style="margin-bottom:20px">
      <h3 style="margin-bottom:6px">❌ 危险操作</h3>
      <button class="btn btn-danger" onclick="clearAll()" style="margin-top:8px">清除所有数据</button>
    </div>

    <div style="text-align:center; margin-top:40px">
      <p style="color:var(--text2); font-size:12px">API余额 v1.0 · 数据仅保存在本机</p>
    </div>
  </div>
</div>

<!-- Bottom nav -->
<div class="nav">
  <button class="nav-btn active" data-page="pageHome" onclick="switchPage('pageHome')">
    <span class="ico">📊</span> 余额
  </button>
  <button class="nav-btn" data-page="pageSettings" onclick="switchPage('pageSettings')">
    <span class="ico">⚙️</span> 设置
  </button>
</div>

<!-- Add/Edit Sheet -->
<div class="overlay" id="sheetOverlay" onclick="closeSheet(event)">
  <div class="sheet" id="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <h2 id="sheetTitle">添加 API</h2>
    <div class="form-group">
      <label>服务商</label>
      <select id="sProvider">
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic</option>
        <option value="google">Google AI (Gemini)</option>
        <option value="deepseek">DeepSeek</option>
        <option value="openrouter">OpenRouter</option>
        <option value="groq">Groq</option>
        <option value="custom">自定义</option>
      </select>
    </div>
    <div class="form-group" id="customNameGroup" style="display:none">
      <label>自定义名称</label>
      <input type="text" id="sCustomName" placeholder="我的 API">
    </div>
    <div class="form-group">
      <label>API Key</label>
      <input type="password" id="sKey" placeholder="sk-..." autocomplete="off">
    </div>
    <div class="form-group">
      <label>Base URL (可选)</label>
      <input type="text" id="sBaseUrl" placeholder="默认">
    </div>
    <div class="form-row" style="margin-top:6px">
      <button class="btn btn-secondary" onclick="closeSheet()">取消</button>
      <button class="btn btn-primary" id="btnSave" onclick="saveKey()">保存</button>
    </div>
    <button class="btn btn-secondary" id="btnCheck" style="margin-top:8px;display:none" onclick="checkSingle()">🔍 测试连接</button>
    <button class="btn btn-danger" id="btnDelete" style="margin-top:8px;display:none" onclick="deleteKey()">🗑 删除此密钥</button>
  </div>
</div>

<script>
// ── State ──
const PROVIDERS = {
  openai:    { name: 'OpenAI',     icon: '🧠', cls: 'openai',    defaultBase: 'https://api.openai.com/v1' },
  anthropic: { name: 'Anthropic',  icon: '🎭', cls: 'anthropic', defaultBase: 'https://api.anthropic.com/v1' },
  google:    { name: 'Google AI',  icon: '🌐', cls: 'google',    defaultBase: 'https://generativelanguage.googleapis.com/v1beta' },
  deepseek:  { name: 'DeepSeek',   icon: '🐋', cls: 'deepseek',  defaultBase: 'https://api.deepseek.com/v1' },
  openrouter:{ name: 'OpenRouter', icon: '🔀', cls: 'openrouter',defaultBase: 'https://openrouter.ai/api/v1' },
  groq:      { name: 'Groq',       icon: '⚡', cls: 'groq',      defaultBase: 'https://api.groq.com/openai/v1' },
  custom:    { name: '自定义',     icon: '🔧', cls: 'custom',    defaultBase: '' },
};

let keys = JSON.parse(localStorage.getItem('apibal_keys') || '[]');
let balances = JSON.parse(localStorage.getItem('apibal_balances') || '{}');
let pin = localStorage.getItem('apibal_pin') || '';
let pinEnabled = localStorage.getItem('apibal_pin_enabled') !== 'false'; // default true
let editingId = null; // null = adding new
let toastTimer = null;

// ── PIN ──
const pinScreen = document.getElementById('pinScreen');
const pinInput = document.getElementById('pinInput');
const pinError = document.getElementById('pinError');

function showPIN(onSuccess) {
  if (!pinEnabled || !pin) { onSuccess(); return; }
  pinScreen.classList.remove('hidden');
  pinInput.value = '';
  pinError.textContent = '';
  pinInput.focus();
  pinScreen._callback = onSuccess;
}

pinInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitPIN();
});
pinInput.addEventListener('input', () => {
  if (pinInput.value.length >= 6) submitPIN();
});

function submitPIN() {
  const entered = pinInput.value.trim();
  if (entered === pin) {
    pinScreen.classList.add('hidden');
    if (pinScreen._callback) { const cb = pinScreen._callback; delete pinScreen._callback; cb(); }
  } else {
    pinError.textContent = 'PIN 错误，请重试';
    pinInput.value = '';
    setTimeout(() => { pinError.textContent = ''; }, 1500);
  }
}

function togglePin() {
  if (!pin && pinEnabled) {
    changePin();
    return;
  }
  pinEnabled = !pinEnabled;
  localStorage.setItem('apibal_pin_enabled', pinEnabled);
  document.getElementById('togglePin').classList.toggle('on', pinEnabled);
  toast(pinEnabled ? 'PIN 保护已开启' : 'PIN 保护已关闭');
}

function changePin() {
  const newPin = prompt('请输入新的 6 位数字 PIN 码：');
  if (!newPin) return;
  if (!/^\d{6}$/.test(newPin)) { toast('PIN 必须是 6 位数字'); return; }
  pin = newPin;
  localStorage.setItem('apibal_pin', pin);
  pinEnabled = true;
  localStorage.setItem('apibal_pin_enabled', 'true');
  document.getElementById('togglePin').classList.add('on');
  document.getElementById('pinStatus').textContent = '已设置';
  toast('PIN 已更新 ✅');
}

// ── Toast ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Sheet ──
function openSheet(id = null) {
  editingId = id;
  const overlay = document.getElementById('sheetOverlay');
  document.getElementById('sheetTitle').textContent = id !== null ? '编辑 API' : '添加 API';
  document.getElementById('btnSave').textContent = id !== null ? '更新' : '保存';
  document.getElementById('btnCheck').style.display = id !== null ? 'block' : 'none';
  document.getElementById('btnDelete').style.display = id !== null ? 'block' : 'none';

  if (id !== null) {
    const k = keys.find(x => x.id === id);
    if (k) {
      document.getElementById('sProvider').value = k.provider;
      document.getElementById('sKey').value = k.key;
      document.getElementById('sBaseUrl').value = k.baseUrl || '';
      document.getElementById('sCustomName').value = k.customName || '';
      onProviderChange();
    }
  } else {
    document.getElementById('sProvider').value = 'openai';
    document.getElementById('sKey').value = '';
    document.getElementById('sBaseUrl').value = '';
    document.getElementById('sCustomName').value = '';
    onProviderChange();
  }
  overlay.classList.add('show');
}

function closeSheet(e) {
  if (e && e.target !== document.getElementById('sheetOverlay')) return;
  document.getElementById('sheetOverlay').classList.remove('show');
  editingId = null;
}

document.getElementById('sProvider').addEventListener('change', onProviderChange);
function onProviderChange() {
  const pv = document.getElementById('sProvider').value;
  document.getElementById('customNameGroup').style.display = pv === 'custom' ? 'block' : 'none';
}

function saveKey() {
  const provider = document.getElementById('sProvider').value;
  const key = document.getElementById('sKey').value.trim();
  const baseUrl = document.getElementById('sBaseUrl').value.trim();
  const customName = document.getElementById('sCustomName').value.trim();

  if (!key) { toast('请输入 API Key'); return; }
  if (provider === 'custom' && !customName) { toast('请输入自定义名称'); return; }

  if (editingId !== null) {
    const idx = keys.findIndex(k => k.id === editingId);
    if (idx !== -1) {
      keys[idx] = { ...keys[idx], provider, key, baseUrl, customName, updatedAt: Date.now() };
    }
  } else {
    keys.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2,6), provider, key, baseUrl, customName, createdAt: Date.now() });
  }
  persistKeys();
  closeSheet();
  renderAll();
  toast('API 密钥已保存 ✅');
}

function deleteKey() {
  if (!confirm('确定删除此密钥？')) return;
  const id = editingId;
  keys = keys.filter(k => k.id !== id);
  delete balances[id];
  persistKeys();
  localStorage.setItem('apibal_balances', JSON.stringify(balances));
  closeSheet();
  renderAll();
  toast('已删除');
}

function persistKeys() {
  localStorage.setItem('apibal_keys', JSON.stringify(keys));
}

// ── Proxy ──
let proxyUrl = localStorage.getItem('apibal_proxy') || '';
document.getElementById('proxyUrl').value = proxyUrl;

function saveProxy() {
  proxyUrl = document.getElementById('proxyUrl').value.trim();
  localStorage.setItem('apibal_proxy', proxyUrl);
  toast(proxyUrl ? '代理已设置 ✅' : '直连模式（可能受 CORS 限制）');
}

function apiFetch(url, opts = {}) {
  if (proxyUrl) {
    const fullProxy = proxyUrl + encodeURIComponent(url);
    return fetch(fullProxy, opts);
  }
  return fetch(url, opts);
}

// ── Balance checks ──

async function checkBalance(k) {
  const p = PROVIDERS[k.provider] || PROVIDERS.custom;
  const base = k.baseUrl || p.defaultBase;

  try {
    switch (k.provider) {
      case 'openai':
        return await checkOpenAI(k, base);
      case 'anthropic':
        return await checkAnthropic(k, base);
      case 'google':
        return await checkGoogle(k, base);
      case 'deepseek':
        return await checkDeepSeek(k, base);
      case 'openrouter':
        return await checkOpenRouter(k, base);
      case 'groq':
        return await checkGroq(k, base);
      case 'custom':
        return await checkCustom(k, base);
      default:
        return await checkCustom(k, base);
    }
  } catch (e) {
    let errMsg = e.message;
    // Detect CORS errors
    if (errMsg.includes('Failed to fetch') || errMsg.includes('NetworkError') || errMsg.includes('Load failed')) {
      errMsg = proxyUrl ? '代理连接失败，检查代理是否运行' : 'CORS 限制，请在设置中配置代理';
    }
    return { status: 'error', error: errMsg, checkedAt: Date.now() };
  }
}

async function checkOpenAI(k, base) {
  // Try billing/usage endpoint
  const resp = await apiFetch(`${base}/models`, {
    headers: { 'Authorization': `Bearer ${k.key}` }
  });
  if (!resp.ok) {
    const txt = await resp.text().catch(() => '');
    return { status: 'error', error: `HTTP ${resp.status}: ${txt.slice(0,100)}`, checkedAt: Date.now() };
  }
  // Try to get subscription info (only works with certain keys)
  let usageInfo = null;
  try {
    const subResp = await apiFetch('https://api.openai.com/v1/dashboard/billing/subscription', {
      headers: { 'Authorization': `Bearer ${k.key}` }
    });
    if (subResp.ok) {
      const sub = await subResp.json();
      usageInfo = { hard_limit_usd: sub.hard_limit_usd, soft_limit_usd: sub.soft_limit_usd, access_until: sub.access_until };
    }
  } catch(e) {}

  // Try usage endpoint
  let usage = null;
  try {
    const now = new Date();
    const start = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
    const end = now.toISOString().split('T')[0];
    const usageResp = await apiFetch(`https://api.openai.com/v1/usage?date=${start}`, {
      headers: { 'Authorization': `Bearer ${k.key}` }
    });
    if (usageResp.ok) {
      const u = await usageResp.json();
      usage = { total_usage: u.total_usage, daily_costs: u.daily_costs };
    }
  } catch(e) {}

  const rateLimitRemaining = resp.headers.get('x-ratelimit-remaining-requests');
  const rateLimitLimit = resp.headers.get('x-ratelimit-limit-requests');

  return {
    status: 'ok',
    modelsAccessible: true,
    hardLimit: usageInfo?.hard_limit_usd,
    softLimit: usageInfo?.soft_limit_usd,
    rateRemaining: rateLimitRemaining ? parseInt(rateLimitRemaining) : null,
    rateLimit: rateLimitLimit ? parseInt(rateLimitLimit) : null,
    checkedAt: Date.now()
  };
}

async function checkAnthropic(k, base) {
  // Send a tiny message to check headers
  const resp = await apiFetch(`${base}/messages`, {
    method: 'POST',
    headers: {
      'x-api-key': k.key,
      'anthropic-version': '2023-06-01',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1,
      messages: [{ role: 'user', content: 'hi' }]
    })
  });

  const remaining = resp.headers.get('anthropic-ratelimit-requests-remaining');
  const limit = resp.headers.get('anthropic-ratelimit-requests-limit');
  const reset = resp.headers.get('anthropic-ratelimit-requests-reset');
  const tokensRemaining = resp.headers.get('anthropic-ratelimit-tokens-remaining');
  const tokensLimit = resp.headers.get('anthropic-ratelimit-tokens-limit');

  // Whether the request succeeded or rate-limited, we got header info
  const isRateLimited = resp.status === 429;

  return {
    status: 'ok',
    rateRemaining: remaining ? parseInt(remaining) : null,
    rateLimit: limit ? parseInt(limit) : null,
    rateReset: reset || null,
    tokensRemaining: tokensRemaining ? parseInt(tokensRemaining) : null,
    tokensLimit: tokensLimit ? parseInt(tokensLimit) : null,
    isRateLimited,
    checkedAt: Date.now()
  };
}

async function checkGoogle(k, base) {
  const resp = await apiFetch(`${base}/models?key=${k.key}`);
  if (!resp.ok) {
    const txt = await resp.text().catch(() => '');
    return { status: 'error', error: `HTTP ${resp.status}: ${txt.slice(0,100)}`, checkedAt: Date.now() };
  }
  const data = await resp.json();
  const modelCount = data.models?.length || 0;
  return { status: 'ok', modelsAccessible: true, modelCount, checkedAt: Date.now() };
}

async function checkDeepSeek(k, base) {
  // DeepSeek has a balance endpoint
  let balanceData = null;
  try {
    const balResp = await apiFetch(`${base}/user/balance`, {
      headers: { 'Authorization': `Bearer ${k.key}` }
    });
    if (balResp.ok) {
      balanceData = await balResp.json();
    }
  } catch(e) {}

  // Also check models to verify key
  let modelCount = 0;
  try {
    const mResp = await apiFetch(`${base}/models`, {
      headers: { 'Authorization': `Bearer ${k.key}` }
    });
    if (mResp.ok) {
      const mData = await mResp.json();
      modelCount = mData.data?.length || 0;
    }
  } catch(e) {}

  return {
    status: 'ok',
    balance: balanceData?.balance,
    totalBalance: balanceData?.total_balance,
    toppedUpBalance: balanceData?.topped_up_balance,
    isBalanceAvailable: balanceData?.is_available,
    modelCount,
    checkedAt: Date.now()
  };
}

async function checkOpenRouter(k, base) {
  // OpenRouter has a key info endpoint that returns credits
  const resp = await apiFetch(`${base}/auth/key`, {
    headers: { 'Authorization': `Bearer ${k.key}` }
  });
  if (!resp.ok) {
    const txt = await resp.text().catch(() => '');
    return { status: 'error', error: `HTTP ${resp.status}: ${txt.slice(0,100)}`, checkedAt: Date.now() };
  }
  const data = await resp.json();
  return {
    status: 'ok',
    credits: data.data?.credits,
    usage: data.data?.usage,
    limit: data.data?.limit,
    isFreeTier: data.data?.is_free_tier,
    rateLimitRemaining: data.data?.rate_limit?.remaining,
    rateLimitRequests: data.data?.rate_limit?.requests,
    checkedAt: Date.now()
  };
}

async function checkGroq(k, base) {
  const resp = await apiFetch(`${base}/models`, {
    headers: { 'Authorization': `Bearer ${k.key}` }
  });
  if (!resp.ok) {
    const txt = await resp.text().catch(() => '');
    return { status: 'error', error: `HTTP ${resp.status}: ${txt.slice(0,100)}`, checkedAt: Date.now() };
  }
  const data = await resp.json();
  const modelCount = data.data?.length || 0;
  // Groq rate limits from headers
  const rlRemaining = resp.headers.get('x-ratelimit-remaining-requests');
  const rlLimit = resp.headers.get('x-ratelimit-limit-requests');
  const rlReset = resp.headers.get('x-ratelimit-reset-requests');
  return {
    status: 'ok',
    modelsAccessible: true,
    modelCount,
    rateRemaining: rlRemaining ? parseInt(rlRemaining) : null,
    rateLimit: rlLimit ? parseInt(rlLimit) : null,
    rateReset: rlReset || null,
    checkedAt: Date.now()
  };
}

async function checkCustom(k, base) {
  if (!base) {
    return { status: 'error', error: '请设置 Base URL', checkedAt: Date.now() };
  }
  // Try a generic models endpoint
  const resp = await apiFetch(`${base}/models`, {
    headers: k.key.startsWith('Bearer ') ? { 'Authorization': k.key } : { 'Authorization': `Bearer ${k.key}` }
  });
  if (resp.ok) {
    try {
      const data = await resp.json();
      const modelCount = data.data?.length || data.models?.length || 0;
      return { status: 'ok', modelsAccessible: true, modelCount, checkedAt: Date.now() };
    } catch(e) {
      return { status: 'ok', modelsAccessible: true, checkedAt: Date.now() };
    }
  }
  const txt = await resp.text().catch(() => '');
  return { status: 'error', error: `HTTP ${resp.status}`, checkedAt: Date.now() };
}

// ── Render ──

function switchPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.page === pageId);
  });
}

function renderAll() {
  renderSummary();
  renderList();
}

function renderSummary() {
  const total = keys.length;
  const ok = keys.filter(k => balances[k.id]?.status === 'ok').length;
  const err = keys.filter(k => balances[k.id]?.status === 'error').length;
  const unchecked = total - ok - err;

  document.getElementById('summary').innerHTML = `
    <div class="summary-card">
      <div class="val">${total}</div>
      <div class="lbl">总密钥</div>
    </div>
    <div class="summary-card">
      <div class="val green">${ok}</div>
      <div class="lbl">可用</div>
    </div>
    <div class="summary-card">
      <div class="val ${err > 0 ? 'red' : ''}">${err}</div>
      <div class="lbl">异常</div>
    </div>
  `;
}

function formatBalanceCard(k) {
  const p = PROVIDERS[k.provider] || PROVIDERS.custom;
  const b = balances[k.id];
  const name = k.customName || p.name;
  const displayKey = k.key.slice(0, 6) + '···' + k.key.slice(-4);

  let statusHTML = '';
  let balanceHTML = '';
  let progressHTML = '';

  if (!b) {
    statusHTML = '<span class="dot idle"></span> 未检测';
    balanceHTML = `<div class="card-stat"><div class="num" style="color:var(--text2)">—</div><div class="label">状态未知</div></div>`;
  } else if (b.status === 'error') {
    statusHTML = '<span class="dot err"></span> 连接失败';
    balanceHTML = `<div class="card-stat"><div class="num" style="color:var(--red)">❌</div><div class="label">${b.error || '错误'}</div></div>`;
  } else if (b.status === 'ok') {
    statusHTML = '<span class="dot ok"></span> 正常';
    let parts = [];

    // Build based on provider type
    if (b.credits !== undefined) {
      const c = Number(b.credits).toFixed(2);
      parts.push(`<div class="card-stat"><div class="num">$${c}</div><div class="label">余额</div></div>`);
    }
    if (b.balance !== undefined) {
      const bal = Number(b.balance);
      parts.push(`<div class="card-stat"><div class="num">¥${bal.toFixed(2)}</div><div class="label">余额</div></div>`);
    }
    if (b.totalBalance !== undefined) {
      parts.push(`<div class="card-stat"><div class="num">¥${Number(b.totalBalance).toFixed(2)}</div><div class="label">总充值</div></div>`);
    }
    if (b.hardLimit !== undefined && b.hardLimit !== null) {
      parts.push(`<div class="card-stat"><div class="num">$${Number(b.hardLimit).toFixed(0)}</div><div class="label">硬上限</div></div>`);
    }
    if (b.rateRemaining !== null && b.rateRemaining !== undefined) {
      const pct = b.rateLimit ? Math.round(b.rateRemaining / b.rateLimit * 100) : 100;
      const cls = pct < 20 ? 'danger' : pct < 50 ? 'warn' : '';
      parts.push(`<div class="card-stat"><div class="num">${b.rateRemaining}/${b.rateLimit||'?'}</div><div class="label">请求配额</div></div>`);
      progressHTML = `<div class="progress-bar"><div class="fill ${cls}" style="width:${pct}%"></div></div>`;
    }
    if (b.tokensRemaining !== null && b.tokensRemaining !== undefined) {
      parts.push(`<div class="card-stat"><div class="num">${(b.tokensRemaining/1000).toFixed(0)}k</div><div class="label">Token 剩余</div></div>`);
    }
    if (b.modelCount && parts.length === 0) {
      parts.push(`<div class="card-stat"><div class="num">${b.modelCount}</div><div class="label">可用模型</div></div>`);
    }
    if (parts.length === 0) {
      parts.push(`<div class="card-stat"><div class="num">✅</div><div class="label">连接正常</div></div>`);
    }
    balanceHTML = parts.join('');
  }

  const updatedAt = b?.checkedAt ? new Date(b.checkedAt).toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' }) : '';

  return `
    <div class="card" onclick="openSheet('${k.id}')">
      <div class="card-top">
        <div class="card-icon ${p.cls}">${p.icon}</div>
        <div>
          <div class="card-name">${name}</div>
          <div class="card-status">${statusHTML}</div>
        </div>
        <div class="card-arrow" style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
          <span style="font-size:10px;color:var(--text2)">${updatedAt}</span>
          <span>›</span>
        </div>
      </div>
      <div class="card-balance">${balanceHTML}</div>
      ${progressHTML}
      <div style="font-size:10px;color:var(--text2);margin-top:8px;font-family:monospace">${displayKey}</div>
    </div>
  `;
}

function renderList() {
  const el = document.getElementById('providerList');
  if (keys.length === 0) {
    el.innerHTML = `
      <div class="empty">
        <div class="empty-icon">💳</div>
        <h3>还没有 API 密钥</h3>
        <p>点击下方按钮添加你的第一个 API 密钥，支持 OpenAI、Anthropic、DeepSeek 等主流服务</p>
        <button class="btn btn-primary" style="width:auto;padding:14px 28px" onclick="openSheet()">+ 添加 API 密钥</button>
      </div>`;
  } else {
    el.innerHTML = keys.map(k => formatBalanceCard(k)).join('')
      + `<button class="btn btn-secondary" style="margin-top:8px" onclick="openSheet()">+ 添加 API 密钥</button>`;
  }
  renderSummary();
}

// ── Refresh ──
async function refreshAll() {
  if (keys.length === 0) return toast('请先添加 API 密钥');
  toast('正在刷新...');
  document.getElementById('providerList').classList.add('loading');

  for (const k of keys) {
    balances[k.id] = await checkBalance(k);
  }

  localStorage.setItem('apibal_balances', JSON.stringify(balances));
  document.getElementById('providerList').classList.remove('loading');
  renderAll();
  const ok = keys.filter(k => balances[k.id]?.status === 'ok').length;
  toast(`刷新完成: ${ok}/${keys.length} 可用`);
}

async function checkSingle() {
  if (editingId === null) return;
  const k = keys.find(x => x.id === editingId);
  if (!k) return;
  toast('正在检测...');
  balances[k.id] = await checkBalance(k);
  localStorage.setItem('apibal_balances', JSON.stringify(balances));
  renderAll();
  const b = balances[k.id];
  toast(b?.status === 'ok' ? '连接成功 ✅' : `连接失败: ${b?.error || '未知错误'}`);
}

// ── Clear all ──
function clearAll() {
  if (!confirm('确定要清除所有 API 密钥和余额数据吗？此操作不可恢复。')) return;
  if (!confirm('再次确认：真的要删除所有数据吗？')) return;
  keys = [];
  balances = {};
  localStorage.removeItem('apibal_keys');
  localStorage.removeItem('apibal_balances');
  renderAll();
  toast('所有数据已清除');
}

// ── Init ──
document.getElementById('togglePin').classList.toggle('on', pinEnabled);
document.getElementById('pinStatus').textContent = pin ? '已设置 (······)' : '未设置';

// Show PIN on launch
showPIN(() => {
  renderAll();
});

// Refresh all automatically if there are keys and no recent balance data
const hasRecent = keys.some(k => {
  const b = balances[k.id];
  return b && b.checkedAt && (Date.now() - b.checkedAt < 3600000);
});
if (keys.length > 0 && !hasRecent) {
  setTimeout(() => refreshAll(), 500);
}

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
